<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="AI ChatBot powered by GitHub Models - Free, Private, Powerful">
    <meta name="theme-color" content="#6366f1">
    
    <title>AI ChatBot | GitHub Models</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/icons/favicon.ico">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/themes/light.css" id="theme-light">
    <link rel="stylesheet" href="css/themes/dark.css" id="theme-dark" disabled>
</head>
<body>
    <!-- Main Container -->
    <div class="app-container">
        
        <!-- Sidebar (Model Selection & History) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-robot"></i>
                    <span>AI ChatBot</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            
            <!-- New Chat Button -->
            <button class="new-chat-btn" id="newChatBtn">
                <i class="fas fa-plus"></i>
                <span>گفتگوی جدید</span>
            </button>
            
            <!-- Model Selection Section -->
            <div class="model-section">
                <div class="section-title">
                    <i class="fas fa-microchip"></i>
                    <span>مدل هوش مصنوعی</span>
                </div>
                <div class="model-selector" id="modelSelector">
                    <!-- Models will be populated dynamically -->
                </div>
                <div class="model-info" id="modelInfo">
                    <!-- Model details will appear here -->
                </div>
            </div>
            
            <!-- Conversation History -->
            <div class="history-section">
                <div class="section-title">
                    <i class="fas fa-history"></i>
                    <span>گفتگوهای اخیر</span>
                </div>
                <div class="history-list" id="historyList">
                    <!-- Conversation history will appear here -->
                </div>
            </div>
            
            <!-- Sidebar Footer -->
            <div class="sidebar-footer">
                <div class="status-indicator" id="statusIndicator">
                    <i class="fas fa-circle"></i>
                    <span>آماده</span>
                </div>
                <button class="theme-toggle" id="themeToggle">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="settings-btn" id="settingsBtn">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </aside>
        
        <!-- Main Chat Area -->
        <main class="chat-area">
            
            <!-- Chat Header -->
            <header class="chat-header">
                <div class="model-badge" id="modelBadge">
                    <i class="fas fa-brain"></i>
                    <span id="currentModelName">GPT-4o</span>
                </div>
                <div class="chat-actions">
                    <button class="action-btn" id="clearChatBtn" title="پاک کردن گفتگو">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                    <button class="action-btn" id="exportChatBtn" title="خروجی گرفتن">
                        <i class="fas fa-download"></i>
                    </button>
                    <button class="action-btn" id="settingsChatBtn" title="تنظیمات">
                        <i class="fas fa-sliders-h"></i>
                    </button>
                </div>
            </header>
            
            <!-- Messages Container -->
            <div class="messages-container" id="messagesContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon">
                        <i class="fas fa-comments"></i>
                    </div>
                    <h2>به AI ChatBot خوش آمدید</h2>
                    <p>قدرت گرفته از GitHub Models - کاملاً رایگان</p>
                    <div class="feature-grid">
                        <div class="feature-card">
                            <i class="fas fa-brain"></i>
                            <span>مدل‌های پیشرفته AI</span>
                        </div>
                        <div class="feature-card">
                            <i class="fas fa-shield-alt"></i>
                            <span>امن و خصوصی</span>
                        </div>
                        <div class="feature-card">
                            <i class="fas fa-language"></i>
                            <span>پشتیبانی از فارسی</span>
                        </div>
                        <div class="feature-card">
                            <i class="fas fa-infinity"></i>
                            <span>مکالمات نامحدود</span>
                        </div>
                    </div>
                </div>
                <div id="messagesList"></div>
            </div>
            
            <!-- Typing Indicator -->
            <div class="typing-indicator" id="typingIndicator" style="display: none;">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <span>در حال تایپ...</span>
            </div>
            
            <!-- Input Area -->
            <div class="input-area">
                <div class="input-container">
                    <textarea 
                        id="messageInput" 
                        placeholder="پیام خود را بنویسید... (Shift+Enter برای خط جدید، Enter برای ارسال)"
                        rows="1"
                    ></textarea>
                    <div class="input-actions">
                        <button class="attach-btn" id="attachBtn" title="پیوست فایل">
                            <i class="fas fa-paperclip"></i>
                        </button>
                        <button class="send-btn" id="sendBtn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
                <div class="input-footer">
                    <span class="token-info" id="tokenInfo">
                        <i class="fas fa-charging-station"></i>
                        <span>در حال دریافت اطلاعات...</span>
                    </span>
                    <span class="rate-limit-info" id="rateLimitInfo">
                        <i class="fas fa-tachometer-alt"></i>
                        <span>-</span>
                    </span>
                </div>
            </div>
            
        </main>
        
        <!-- Settings Modal -->
        <div class="modal" id="settingsModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>تنظیمات پیشرفته</h3>
                    <button class="modal-close">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="setting-group">
                        <label>دمای خلاقیت (Temperature)</label>
                        <input type="range" id="tempSlider" min="0" max="2" step="0.1" value="0.7">
                        <span id="tempValue">0.7</span>
                    </div>
                    <div class="setting-group">
                        <label>حداکثر توکن‌های خروجی</label>
                        <input type="number" id="maxTokensInput" min="100" max="4096" value="1000">
                    </div>
                    <div class="setting-group">
                        <label>سیستم پرامپت (System Prompt)</label>
                        <textarea id="systemPromptInput" rows="4" placeholder="دستورالعمل‌های سفارشی برای AI..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn-secondary" id="resetSettingsBtn">بازنشانی</button>
                    <button class="btn-primary" id="saveSettingsBtn">ذخیره تنظیمات</button>
                </div>
            </div>
        </div>
        
    </div>
    
    <!-- JavaScript Modules -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/models.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
