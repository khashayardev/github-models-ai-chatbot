name: AI ChatBot Workflow

on:
  repository_dispatch:
    types: [chat-request]

permissions:
  contents: read
  actions: write
  id-token: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  process-chat-request:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      
      - name: Process with GitHub Models
        run: |
          cd backend
          
          MESSAGE='${{ github.event.client_payload.message }}'
          MODEL_ID='${{ github.event.client_payload.model_id }}'
          HISTORY='${{ github.event.client_payload.history }}'
          
          python model_handler.py \
            --message "$MESSAGE" \
            --model "$MODEL_ID" \
            --history "$HISTORY" \
            2>&1 | tee response.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload response
        uses: actions/upload-artifact@v4
        with:
          name: chat-response
          path: backend/response.json
          retention-days: 1
