name: AI ChatBot Workflow

on:
  repository_dispatch:
    types: [chat-request]

permissions:
  contents: read
  actions: write
  id-token: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  process-chat-request:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Process with GitHub Models
        id: ai_process
        run: |
          cd backend
          MESSAGE='${{ github.event.client_payload.message }}'
          MODEL_ID='${{ github.event.client_payload.model_id }}'
          CONVERSATION_HISTORY='${{ github.event.client_payload.history }}'
          
          python model_handler.py --message "$MESSAGE" --model "$MODEL_ID" --history "$CONVERSATION_HISTORY"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Save response
        run: |
          echo "Response processed successfully"
